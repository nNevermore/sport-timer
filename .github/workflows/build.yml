name: Build Tauri App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check quality, formatting and types
        run: |
          npm run lint:oxlint
          npx ultracite check
          npm run check:types
          npm run check:deps

  build-windows:
    needs: lint
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Build MSIX Installer
        run: npm run build:msix

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProSimpleTimer-Windows
          path: ProSimpleTimer.msix

  build-linux:
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          shared-key: "ubuntu-22.04"

      - name: Build Debian Package
        run: npm run tauri build -- --bundles deb

      - name: Build Snap Package
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: ProSimpleTimer-Debian
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Snap Package
        uses: actions/upload-artifact@v4
        with:
          name: ProSimpleTimer-Snap
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Publish Snap Package
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable
