name: Build Tauri App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest] # Currently configured only for Windows (MSIX)

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check quality, formatting and types
        run: |
          npm run lint:oxlint
          npx ultracite check
          npm run check:types
          npm run check:deps

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Build MSIX Installer
        run: npm run build:msix

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProSimpleTimer-Windows
          path: ProSimpleTimer.msix
